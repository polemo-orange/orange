<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贪吃蛇</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    color: #eee;
  }
  h1 { margin-bottom: 16px; letter-spacing: 4px; color: #4ecca3; }
  #score { margin-bottom: 12px; font-size: 18px; color: #aaa; }
  canvas {
    border: 3px solid #4ecca3;
    border-radius: 8px;
    background: #0f0f23;
    box-shadow: 0 0 30px rgba(78,204,163,0.3);
  }
  #info { margin-top: 14px; font-size: 14px; color: #666; }
  button {
    margin-top: 16px;
    padding: 10px 32px;
    font-size: 16px;
    background: #4ecca3;
    color: #1a1a2e;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    transition: opacity .2s;
  }
  button:hover { opacity: 0.8; }
</style>
</head>
<body>
<h1>🐍 贪吃蛇</h1>
<div id="score">得分：0</div>
<canvas id="c"></canvas><br>
<button onclick="startGame()">开始 / 重新开始</button>
<div id="info">方向键 或 WASD 控制方向</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 20, ROWS = 22, COLS = 22;
canvas.width  = W * COLS;
canvas.height = W * ROWS;

let snake, dir, food, score, gameOver, timer;

function init() {
  snake   = [{x:10,y:11},{x:9,y:11},{x:8,y:11}];
  dir     = {x:1,y:0};
  score   = 0;
  gameOver= false;
  placeFood();
  draw();
  document.getElementById('score').textContent = '得分：0';
}

function placeFood() {
  do {
    food = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)};
  } while (snake.some(s => s.x===food.x && s.y===food.y));
}

function draw() {
  ctx.fillStyle = '#0f0f23';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // 蛇身体
  snake.forEach((s,i) => {
    ctx.fillStyle = i===0 ? '#4ecca3' : `hsl(${140 + i*3},80%,${65 - i*1.5}%)`;
    ctx.beginPath();
    ctx.roundRect(s.x*W+1, s.y*W+1, W-2, W-2, 4);
    ctx.fill();
  });

  // 食物
  ctx.fillStyle = '#ff6b6b';
  ctx.beginPath();
  ctx.arc(food.x*W+W/2, food.y*W+W/2, W/2-2, 0, Math.PI*2);
  ctx.fill();

  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = '#ff6b6b';
    ctx.font = 'bold 28px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText('游戏结束！', canvas.width/2, canvas.height/2 - 16);
    ctx.fillStyle = '#ccc';
    ctx.font = '18px Segoe UI';
    ctx.fillText('点击「开始 / 重新开始」再来', canvas.width/2, canvas.height/2 + 20);
  }
}

function step() {
  if (gameOver) return;
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  // 撞墙
  if (head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS) { gameOver=true; draw(); return; }
  // 撞自己
  if (snake.some(s=>s.x===head.x&&s.y===head.y)) { gameOver=true; draw(); return; }

  snake.unshift(head);
  if (head.x===food.x && head.y===food.y) {
    score += 10;
    document.getElementById('score').textContent = '得分：' + score;
    placeFood();
  } else {
    snake.pop();
  }
  draw();
}

function startGame() {
  clearInterval(timer);
  init();
  timer = setInterval(step, 130);
}

document.addEventListener('keydown', e => {
  const map = {
    ArrowUp:{x:0,y:-1}, ArrowDown:{x:0,y:1},
    ArrowLeft:{x:-1,y:0}, ArrowRight:{x:1,y:0},
    w:{x:0,y:-1}, s:{x:0,y:1}, a:{x:-1,y:0}, d:{x:1,y:0},
    W:{x:0,y:-1}, S:{x:0,y:1}, A:{x:-1,y:0}, D:{x:1,y:0}
  };
  const nd = map[e.key];
  if (nd && (nd.x !== -dir.x || nd.y !== -dir.y)) {
    dir = nd;
    e.preventDefault();
  }
});

// 移动端支持：滑动
let touch0 = null;
canvas.addEventListener('touchstart', e => { touch0 = e.touches[0]; e.preventDefault(); }, {passive:false});
canvas.addEventListener('touchend', e => {
  if (!touch0) return;
  const dx = e.changedTouches[0].clientX - touch0.clientX;
  const dy = e.changedTouches[0].clientY - touch0.clientY;
  if (Math.abs(dx)>Math.abs(dy)) {
    if (dx>0 && dir.x!==-1) dir={x:1,y:0};
    else if (dx<0 && dir.x!==1) dir={x:-1,y:0};
  } else {
    if (dy>0 && dir.y!==-1) dir={x:0,y:1};
    else if (dy<0 && dir.y!==1) dir={x:0,y:-1};
  }
  touch0 = null;
}, {passive:false});

// 首次加载不自动开始
draw();
</script>
</body>
</html>
